name: audit

# Dependency + container vulnerability audit. Per-stack jobs; fieldwork-init
# disables the ones that don't apply.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # weekly Monday 09:00 UTC (catches issues outside PR cadence)

permissions:
  contents: read
  pull-requests: read

jobs:
  npm-audit:
    if: ${{ hashFiles('package-lock.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm audit --audit-level=high

  pip-audit:
    if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'poetry.lock') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --strict

  cargo-audit:
    if: ${{ hashFiles('Cargo.lock') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings

  govulncheck:
    if: ${{ hashFiles('go.mod') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  trivy:
    if: ${{ hashFiles('Dockerfile', '**/Dockerfile') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "config"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
