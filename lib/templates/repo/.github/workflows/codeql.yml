name: codeql

# GitHub-native data-flow SAST. Catches taint flows Semgrep doesn't.
#
# IMPORTANT: CodeQL is FREE on PUBLIC repos. On PRIVATE repos it requires
# GitHub Advanced Security (paid add-on). fieldwork-init only enables this
# workflow on public repos by default; private repos rely on semgrep + claude-review.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # weekly Monday 08:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # fieldwork-init prunes this matrix to languages actually present.
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
