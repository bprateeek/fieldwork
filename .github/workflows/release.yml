name: release

# Publishes a GitHub release with a source archive and SHA256SUMS when a
# version tag is pushed. The tag itself is created and signed manually
# (`git tag -s vX.Y.Z`); this workflow only verifies and publishes.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          bash tests/static-checks.sh
          python3 tests/broker-validation-tests.py
          python3 tests/bot-tests.py
          python3 tests/pr-prepare-validation-tests.py

      - name: Build source archive and checksums
        run: |
          tag="${GITHUB_REF_NAME}"
          archive="fieldwork-${tag}.tar.gz"
          git archive --format=tar.gz --prefix="fieldwork-${tag}/" -o "$archive" HEAD
          sha256sum "$archive" > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          {
            echo "Developer preview release ${tag}."
            echo
            echo "Verify the signed tag: git tag -v ${tag}"
            echo "Verify the archive: shasum -a 256 -c SHA256SUMS"
            echo
            echo "See CHANGELOG.md for changes and migration notes."
          } > release-notes.md
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            "fieldwork-${tag}.tar.gz" SHA256SUMS
